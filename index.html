<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Ocean Survivor</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="app">

<canvas id="gameCanvas"></canvas>

<!-- TITLE -->
<div id="titleScreen" class="screen active">
  <h1 id="titleMain">Ocean Survivor</h1>

  <div class="titleButtons">
    <button id="startBtn">TAP START</button>
    <button id="weaponCodexBtn">武器図鑑</button>
    <button id="enemyCodexBtn">敵図鑑</button>
    <button id="rankingBtn">ランキング</button>
  </div>
</div>

<!-- RANKING -->
<div id="rankingScreen" class="screen">
  <h2>ランキング</h2>
  <div id="rankingList"></div>
  <button id="rankingBackBtn">戻る</button>
</div>

<!-- WEAPON CODEX -->
<div id="weaponCodexScreen" class="screen">
  <h2>武器図鑑</h2>
  <div id="weaponCodexList" class="scrollArea"></div>
  <button id="weaponCodexBackBtn">戻る</button>
</div>

<!-- ENEMY CODEX -->
<div id="enemyCodexScreen" class="screen">
  <h2>敵図鑑</h2>
  <div id="enemyCodexList" class="scrollArea"></div>
  <button id="enemyCodexBackBtn">戻る</button>
</div>

<!-- WEAPON SELECT -->
<div id="weaponSelectScreen" class="screen">
  <h2>初期武器選択</h2>
  <div id="weaponSelectList" class="scrollArea"></div>
</div>

<!-- LEVEL UP -->
<div id="levelUpScreen" class="screen">
  <h2>レベルアップ</h2>
  <button id="levelUpRerollBtn">リロール (0)</button>
  <div id="levelUpChoices" class="scrollArea"></div>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen">
  <h2>ショップ</h2>
  <div id="shopList" class="scrollArea"></div>
  <button id="closeShopBtn">閉じる</button>
</div>

<!-- WEAPON GROWTH -->
<div id="weaponGrowthScreen" class="screen">
  <h2>武器成長表</h2>
  <div id="weaponGrowthContent" class="scrollArea"></div>
  <button id="weaponGrowthBackBtn">戻る</button>
</div>

<!-- CHEST EVOLUTION -->
<div id="chestEvolutionScreen" class="screen">
  <h2>宝箱進化</h2>
  <div id="chestEvolutionChoices" class="scrollArea"></div>
  <button id="chestEvolutionCloseBtn">閉じる</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <h2 id="resultTitle"></h2>
  <div id="resultScore"></div>
  <div id="resultRecord"></div>
  <div id="resultRanking"></div>
  <button id="resultToTitleBtn">タイトルへ</button>
</div>

<!-- HUD -->
<div id="hud" class="simpleUI">

  <div id="hudLeft">
    <canvas id="playerIcon" width="48" height="48"></canvas>

    <div id="hudMainInfo">
      <div id="hpBlock">
        <div id="hpBarWrap">
          <div id="hpBar"></div>
        </div>
        <div id="hpText" class="detailOnly"></div>
      </div>

      <div id="xpBlock">
        <div id="xpText"></div>
        <div id="waveText"></div>
        <div id="goldText"></div>
        <div id="scoreText"></div>
      </div>
    </div>
  </div>

  <div id="hudRight">
    <button id="toggleUIBtn">詳細UI</button>
    <button id="absorbXPBtn">XP回収</button>
  </div>

  <div id="xpBarWrap">
    <div id="xpBar"></div>
  </div>

  <div id="weaponBar"></div>

  <div id="detailPanel" class="detailOnly">
    <div class="detailSection">
      <div class="detailTitle">武器詳細</div>
      <div id="weaponDetailList"></div>
    </div>

    <div class="detailSection">
      <div class="detailTitle">取得済みアイテム</div>
      <div id="passiveDetailList"></div>
    </div>
  </div>
</div>

<!-- MOBILE JOYSTICK -->
<div id="mobileControls">
  <div id="joystickBase">
    <div id="joystickStick"></div>
  </div>
</div>

</div>

<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/data_loader.js"></script>
<script src="js/assets.js"></script>
<script src="js/input.js"></script>
<script src="js/player.js"></script>
<script src="js/enemies.js"></script>
<script src="js/weapons.js"></script>
<script src="js/xp.js"></script>
<script src="js/map.js"></script>
<script src="js/waves.js"></script>
<script src="js/shop.js"></script>
<script src="js/ranking.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
